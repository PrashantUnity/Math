{{ $id := .Ordinal }}
<div class="interactive-card bg-slate-900 text-white rounded-2xl p-6 my-8 shadow-2xl border border-slate-700">
    <div class="flex flex-col lg:flex-row gap-8">
        <!-- Controls Column -->
        <div class="w-full lg:w-1/3 flex flex-col justify-between space-y-6">
            <div>
                <label for="shapeSelect-{{ $id }}" class="block text-sm font-semibold text-slate-300 uppercase tracking-wider mb-2">Select Shape Sequence</label>
                <select id="shapeSelect-{{ $id }}" class="w-full bg-slate-800 text-white border border-slate-600 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer">
                    <option value="polygons" selected>Regular Polygons</option>
                    <option value="graphs">Complete Graphs</option>
                    <option value="stackedSquares">Stacked Squares</option>
                    <option value="stackedTriangles">Stacked Triangles</option>
                    <option value="koch">Koch Snowflake (Fractal)</option>
                </select>
            </div>

            <div>
                <div class="flex justify-between items-center mb-2">
                    <label for="shapeSlider-{{ $id }}" class="text-sm font-semibold text-slate-300 uppercase tracking-wider">Iteration / Step</label>
                    <span id="shapeStepVal-{{ $id }}" class="bg-blue-600 px-3 py-1 rounded-full text-xs font-bold font-mono">3</span>
                </div>
                <input type="range" id="shapeSlider-{{ $id }}" min="3" max="10" value="3" class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-blue-500">
                <div class="flex justify-between text-xs text-slate-400 font-mono mt-1" id="shapeLabels-{{ $id }}">
                </div>
            </div>

            <div class="bg-slate-800 rounded-xl p-4 border border-slate-700">
                <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Relation Stats</h4>
                <div id="shapeMathOutput-{{ $id }}" class="text-lg font-mono text-center text-blue-400 font-bold bg-slate-950 py-3 rounded-lg border border-slate-800">
                </div>
                <p id="shapeDesc-{{ $id }}" class="text-xs text-slate-300 mt-3 leading-relaxed">
                    A regular polygon has equal sides and angles.
                </p>
            </div>
        </div>

        <!-- Canvas Display Column -->
        <div class="w-full lg:w-2/3 flex flex-col items-center">
            <div class="relative w-full bg-slate-950 rounded-2xl border border-slate-800 flex justify-center items-center p-4 overflow-hidden shadow-inner" style="min-height: 420px;">
                <canvas id="shapeCanvas-{{ $id }}" width="400" height="400" class="max-w-full h-auto"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    const id = "{{ $id }}";
    const canvas = document.getElementById(`shapeCanvas-${id}`);
    const ctx = canvas.getContext('2d');
    const select = document.getElementById(`shapeSelect-${id}`);
    const slider = document.getElementById(`shapeSlider-${id}`);
    const stepVal = document.getElementById(`shapeStepVal-${id}`);
    const mathOutput = document.getElementById(`shapeMathOutput-${id}`);
    const descOutput = document.getElementById(`shapeDesc-${id}`);
    const labelsOutput = document.getElementById(`shapeLabels-${id}`);

    function drawDot(ctx, x, y, color) {
        ctx.beginPath();
        ctx.arc(x, y, 7, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.lineWidth = 1;
        ctx.strokeStyle = '#ffffff';
        ctx.stroke();
    }

    function drawLine(ctx, x1, y1, x2, y2, color, width = 2) {
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.strokeStyle = color;
        ctx.lineWidth = width;
        ctx.stroke();
    }

    const descriptions = {
        polygons: "Regular Polygons: The number of sides increases step-by-step: 3 (triangle), 4 (square), 5 (pentagon), and so on.",
        graphs: "Complete Graphs: Connects every vertex to every other vertex. The number of lines grows rapidly! Formula: $\\frac{v(v-1)}{2}$.",
        stackedSquares: "Stacked Squares: The number of smaller squares grows quadratically. Level $n$ contains $n^2$ units.",
        stackedTriangles: "Stacked Triangles: Count the small triangular tiles. Stacking them in $n$ rows yields $n^2$ total tiles.",
        koch: "Koch Snowflake: A classic fractal constructed by recursively placing speed-bumps on each side. Segment count: $3 \\times 4^i$."
    };

    function updateShapeControls() {
        const type = select.value;
        labelsOutput.innerHTML = '';
        
        if (type === 'polygons') {
            slider.min = 3;
            slider.max = 10;
            slider.value = Math.max(3, Math.min(slider.value, 10));
            labelsOutput.innerHTML = '<span>3 (Tri)</span><span>6 (Hex)</span><span>10 (Dec)</span>';
        } else if (type === 'graphs') {
            slider.min = 2;
            slider.max = 8;
            slider.value = Math.max(2, Math.min(slider.value, 8));
            labelsOutput.innerHTML = '<span>2</span><span>4</span><span>6</span><span>8</span>';
        } else if (type === 'stackedSquares' || type === 'stackedTriangles') {
            slider.min = 1;
            slider.max = 6;
            slider.value = Math.max(1, Math.min(slider.value, 6));
            labelsOutput.innerHTML = '<span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span>';
        } else if (type === 'koch') {
            slider.min = 0;
            slider.max = 4;
            slider.value = Math.max(0, Math.min(slider.value, 4));
            labelsOutput.innerHTML = '<span>0 (Start)</span><span>1</span><span>2</span><span>3</span><span>4</span>';
        }
        
        drawShapePlot();
    }

    function drawShapePlot() {
        const n = parseInt(slider.value);
        stepVal.innerText = n;
        const type = select.value;
        descOutput.innerText = descriptions[type];

        const w = canvas.width;
        const h = canvas.height;
        ctx.clearRect(0, 0, w, h);
        
        const cx = w / 2;
        const cy = h / 2;

        if (type === 'polygons') {
            mathOutput.innerHTML = `\\( \\text{Sides} = ${n}, \\text{Vertices} = ${n} \\)`;
            
            const r = 120;
            const points = [];
            for (let i = 0; i < n; i++) {
                const angle = (i * 2 * Math.PI) / n - Math.PI / 2;
                points.push({
                    x: cx + r * Math.cos(angle),
                    y: cy + r * Math.sin(angle)
                });
            }

            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            for (let i = 1; i < n; i++) {
                ctx.lineTo(points[i].x, points[i].y);
            }
            ctx.closePath();
            ctx.strokeStyle = '#EF4444';
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.fillStyle = 'rgba(239,68,68,0.1)';
            ctx.fill();

            points.forEach(p => drawDot(ctx, p.x, p.y, '#ffffff'));
        } 
        else if (type === 'graphs') {
            const lines = (n * (n - 1)) / 2;
            mathOutput.innerHTML = `\\( K_{${n}}: \\text{Vertices} = ${n}, \\text{Lines} = \\frac{${n}(${n}-1)}{2} = ${lines} \\)`;
            
            const r = 120;
            const points = [];
            for (let i = 0; i < n; i++) {
                const angle = (i * 2 * Math.PI) / n - Math.PI / 2;
                points.push({
                    x: cx + r * Math.cos(angle),
                    y: cy + r * Math.sin(angle)
                });
            }

            for (let i = 0; i < n; i++) {
                for (let j = i + 1; j < n; j++) {
                    drawLine(ctx, points[i].x, points[i].y, points[j].x, points[j].y, '#3B82F6', 2);
                }
            }
            
            points.forEach(p => drawDot(ctx, p.x, p.y, '#ffffff'));
        } 
        else if (type === 'stackedSquares') {
            mathOutput.innerHTML = `\\( \\text{Grid Size} = ${n} \\times ${n} = ${n*n} \\text{ Squares} \\)`;
            const size = 200;
            const step = size / n;
            const startX = cx - size / 2;
            const startY = cy - size / 2;
            
            ctx.strokeStyle = '#F59E0B';
            ctx.lineWidth = 2;
            
            for (let r = 0; r < n; r++) {
                for (let c = 0; c < n; c++) {
                    ctx.strokeRect(startX + c * step, startY + r * step, step, step);
                    ctx.fillStyle = 'rgba(245,158,11,0.05)';
                    ctx.fillRect(startX + c * step, startY + r * step, step, step);
                }
            }
        } 
        else if (type === 'stackedTriangles') {
            mathOutput.innerHTML = `\\( \\text{Total Tiles} = ${n}^2 = ${n*n} \\)`;
            
            const step = 200 / n;
            const triHeight = step * 0.866;
            const startY = cy - (n * triHeight) / 2;

            ctx.strokeStyle = '#10B981';
            ctx.lineWidth = 2;

            for (let r = 0; r < n; r++) {
                const rowWidth = (r + 1) * step;
                const startX = cx - rowWidth / 2;
                const y = startY + r * triHeight;

                for (let c = 0; c <= r; c++) {
                    const tx1 = startX + c * step;
                    const ty1 = y + triHeight;
                    const tx2 = startX + (c + 0.5) * step;
                    const ty2 = y;
                    const tx3 = startX + (c + 1) * step;
                    const ty3 = y + triHeight;

                    ctx.beginPath();
                    ctx.moveTo(tx1, ty1);
                    ctx.lineTo(tx2, ty2);
                    ctx.lineTo(tx3, ty3);
                    ctx.closePath();
                    ctx.stroke();
                    ctx.fillStyle = 'rgba(16,185,129,0.1)';
                    ctx.fill();

                    if (c < r) {
                        ctx.beginPath();
                        ctx.moveTo(tx3, ty3);
                        ctx.lineTo(tx2, ty2);
                        ctx.lineTo(startX + (c + 1.5) * step, y);
                        ctx.closePath();
                        ctx.stroke();
                        ctx.fillStyle = 'rgba(16,185,129,0.05)';
                        ctx.fill();
                    }
                }
            }
        } 
        else if (type === 'koch') {
            const segments = 3 * Math.pow(4, n);
            mathOutput.innerHTML = `\\( \\text{Segments} = 3 \\times 4^{${n}} = ${segments} \\)`;
            
            const size = 260;
            const hTriangle = size * 0.866;
            
            const p1 = { x: cx, y: cy - 2 * hTriangle / 3 };
            const p2 = { x: cx + size / 2, y: cy + hTriangle / 3 };
            const p3 = { x: cx - size / 2, y: cy + hTriangle / 3 };

            const drawKochLine = (a, b, depth) => {
                if (depth === 0) {
                    ctx.beginPath();
                    ctx.moveTo(a.x, a.y);
                    ctx.lineTo(b.x, b.y);
                    ctx.strokeStyle = '#8B5CF6';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                    return;
                }

                const dx = (b.x - a.x) / 3;
                const dy = (b.y - a.y) / 3;

                const c1 = { x: a.x + dx, y: a.y + dy };
                const c3 = { x: b.x - dx, y: b.y - dy };

                const cos60 = 0.5;
                const sin60 = -0.866;
                const rx = dx * cos60 - dy * sin60;
                const ry = dx * sin60 + dy * cos60;
                const c2 = { x: c1.x + rx, y: c1.y + ry };

                drawKochLine(a, c1, depth - 1);
                drawKochLine(c1, c2, depth - 1);
                drawKochLine(c2, c3, depth - 1);
                drawKochLine(c3, b, depth - 1);
            };

            drawKochLine(p1, p2, n);
            drawKochLine(p2, p3, n);
            drawKochLine(p3, p1, n);
        }

        if (typeof renderMathInElement === 'function') {
            renderMathInElement(mathOutput);
        }
    }

    select.addEventListener('change', updateShapeControls);
    slider.addEventListener('input', drawShapePlot);

    window.addEventListener('DOMContentLoaded', updateShapeControls);
})();
</script>
