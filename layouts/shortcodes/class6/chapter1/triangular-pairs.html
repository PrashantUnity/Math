{{ $id := .Ordinal }}
<div class="interactive-card bg-slate-900 text-white rounded-2xl p-6 my-8 shadow-2xl border border-slate-700">
    <div class="flex flex-col lg:flex-row gap-8">
        <div class="w-full lg:w-1/3 flex flex-col justify-between space-y-4">
            <div>
                <h3 class="text-lg font-bold text-blue-400 mb-2">Triangular Pairs</h3>
                <p class="text-sm text-slate-300 leading-relaxed mb-4">
                    See how two consecutive triangular numbers (green and purple dots) fit perfectly together to build a square.
                </p>
                <div class="flex items-center justify-between mb-2">
                    <label for="triPairSlider-{{ $id }}" class="text-xs font-bold uppercase tracking-wider text-slate-400">Step (n):</label>
                    <span id="triPairSliderVal-{{ $id }}" class="bg-blue-600 px-3 py-1 rounded-full text-xs font-bold font-mono">3</span>
                </div>
                <input type="range" id="triPairSlider-{{ $id }}" min="2" max="6" value="3" class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-blue-500">
            </div>

            <div class="bg-slate-800 rounded-xl p-4 border border-slate-700">
                <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Interlocking Formula</h4>
                <div id="triPairFormulaOutput-{{ $id }}" class="text-sm font-mono text-center text-blue-300 bg-slate-950 p-3 rounded-lg border border-slate-800">
                </div>
            </div>
        </div>

        <div class="w-full lg:w-2/3 flex justify-center items-center bg-slate-950 rounded-2xl border border-slate-800 p-4" style="min-height: 320px;">
            <canvas id="triPairCanvas-{{ $id }}" width="300" height="300" class="max-w-full h-auto"></canvas>
        </div>
    </div>
</div>

<script>
(function() {
    const id = "{{ $id }}";
    const canvas = document.getElementById(`triPairCanvas-${id}`);
    const ctx = canvas.getContext('2d');
    const slider = document.getElementById(`triPairSlider-${id}`);
    const sliderVal = document.getElementById(`triPairSliderVal-${id}`);
    const formulaOutput = document.getElementById(`triPairFormulaOutput-${id}`);

    function drawDot(ctx, x, y, color) {
        ctx.beginPath();
        ctx.arc(x, y, 7, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.lineWidth = 1;
        ctx.strokeStyle = '#ffffff';
        ctx.stroke();
    }

    function drawTriangularPairs() {
        const n = parseInt(slider.value);
        sliderVal.innerText = n;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const w = canvas.width;
        const h = canvas.height;
        const p = 30;
        const startX = (w - (n - 1) * p) / 2;
        const startY = (h - (n - 1) * p) / 2;

        const tPrev = ((n - 1) * n) / 2;
        const tCurr = (n * (n + 1)) / 2;
        formulaOutput.innerHTML = `\\( T_{${n-1}} + T_{${n}} = ${tPrev} + ${tCurr} = ${n*n} = ${n}^2 \\)`;
        
        if (typeof renderMathInElement === 'function') {
            renderMathInElement(formulaOutput);
        }

        for (let r = 0; r < n; r++) {
            for (let c = 0; c < n; c++) {
                const col = c <= r ? '#10B981' : '#8B5CF6';
                drawDot(ctx, startX + c * p, startY + r * p, col);
            }
        }
    }
    
    slider.addEventListener('input', drawTriangularPairs);
    
    window.addEventListener('DOMContentLoaded', drawTriangularPairs);
})();
</script>
