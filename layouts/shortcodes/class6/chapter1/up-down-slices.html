{{ $id := .Ordinal }}
<div class="interactive-card bg-slate-900 text-white rounded-2xl p-6 my-8 shadow-2xl border border-slate-700">
    <div class="flex flex-col lg:flex-row gap-8">
        <div class="w-full lg:w-1/3 flex flex-col justify-between space-y-4">
            <div>
                <h3 class="text-lg font-bold text-blue-400 mb-2">Up-and-Down Slices</h3>
                <p class="text-sm text-slate-300 leading-relaxed mb-4">
                    See how adding numbers up and down matches diagonal stripes inside a square grid.
                </p>
                <div class="flex items-center justify-between mb-2">
                    <label for="upDownSlider-{{ $id }}" class="text-xs font-bold uppercase tracking-wider text-slate-400">Peak Value (n):</label>
                    <span id="upDownSliderVal-{{ $id }}" class="bg-blue-600 px-3 py-1 rounded-full text-xs font-bold font-mono">3</span>
                </div>
                <input type="range" id="upDownSlider-{{ $id }}" min="1" max="6" value="3" class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-blue-500">
            </div>

            <div class="bg-slate-800 rounded-xl p-4 border border-slate-700">
                <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Diagonal Sum</h4>
                <div id="upDownFormulaOutput-{{ $id }}" class="text-sm font-mono text-center text-blue-300 bg-slate-950 p-3 rounded-lg border border-slate-800">
                </div>
            </div>
        </div>

        <div class="w-full lg:w-2/3 flex justify-center items-center bg-slate-950 rounded-2xl border border-slate-800 p-4" style="min-height: 320px;">
            <canvas id="upDownCanvas-{{ $id }}" width="300" height="300" class="max-w-full h-auto"></canvas>
        </div>
    </div>
</div>

<script>
(function() {
    const id = "{{ $id }}";
    const canvas = document.getElementById(`upDownCanvas-${id}`);
    const ctx = canvas.getContext('2d');
    const slider = document.getElementById(`upDownSlider-${id}`);
    const sliderVal = document.getElementById(`upDownSliderVal-${id}`);
    const formulaOutput = document.getElementById(`upDownFormulaOutput-${id}`);

    const oddColors = ['#EF4444', '#3B82F6', '#10B981', '#F59E0B', '#EC4899', '#6366F1'];

    function drawDot(ctx, x, y, color) {
        ctx.beginPath();
        ctx.arc(x, y, 7, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.lineWidth = 1;
        ctx.strokeStyle = '#ffffff';
        ctx.stroke();
    }

    function drawUpDown() {
        const n = parseInt(slider.value);
        sliderVal.innerText = n;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const w = canvas.width;
        const h = canvas.height;
        const size = 6;
        const p = 30;
        const startX = (w - (size - 1) * p) / 2;
        const startY = (h - (size - 1) * p) / 2;

        let terms = [];
        for (let i = 1; i <= n; i++) terms.push(i);
        for (let i = n - 1; i >= 1; i--) terms.push(i);
        const sum = n * n;
        formulaOutput.innerHTML = `\\( ${terms.join(' + ')} = ${sum} = ${n}^2 \\)`;
        
        if (typeof renderMathInElement === 'function') {
            renderMathInElement(formulaOutput);
        }

        for (let r = 0; r < size; r++) {
            for (let c = 0; c < size; c++) {
                let col = '#475569';
                if (r < n && c < n) {
                    const diff = Math.abs(r - c);
                    col = oddColors[n - 1 - diff];
                }
                drawDot(ctx, startX + c * p, startY + r * p, col);
            }
        }
    }
    
    slider.addEventListener('input', drawUpDown);
    
    window.addEventListener('DOMContentLoaded', drawUpDown);
})();
</script>
