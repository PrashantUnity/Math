baseURL = 'https://prashant.codefrydev.in/Math/'
locale = 'en-us'
title = 'Math Explorer'
theme = 'PaperMod'

enableRobotsTXT = true
buildDrafts = true
[pagination]
pagerSize = 5

[outputs]
home = ["HTML", "RSS", "JSON"]

[params]
env = "production"
title = "Math Explorer"
description = "Fun, interactive, and easy-to-understand mathematics for Class 6 students and above."
author = "Math Explorer Team"
defaultTheme = "auto"
disableThemeToggle = false

# Enable KaTeX Math Rendering across the site
math = true

ShowReadingTime = true
ShowShareButtons = true
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowToc = true
TocOpen = false
comments = false

[params.homeInfoParams]
Title = "Welcome to Math Explorer 📐"
Content = "Master mathematics with ease! Clear explanations, visual guides, and practice problems for students from Class 6 onwards. Explore Algebra, Geometry, Number Systems, and Math Tricks."

[[params.socialIcons]]
name = "github"
url = "https://github.com"

[[params.socialIcons]]
name = "x"
url = "https://x.com"

[[params.socialIcons]]
name = "rss"
url = "index.xml"

# Main Navigation Menu
[[menu.main]]
identifier = "archives"
name = "Archives"
url = "/archives/"
weight = 10

[[menu.main]]
identifier = "search"
name = "Search"
url = "/search/"
weight = 20

[[menu.main]]
identifier = "tags"
name = "Topics"
url = "/tags/"
weight = 30

[[menu.main]]
identifier = "categories"
name = "Classes & Categories"
url = "/categories/"
weight = 40

[[menu.main]]
identifier = "about"
name = "About"
url = "/about/"
weight = 50

[markup]
[markup.goldmark.renderer]
unsafe = true

# Goldmark Passthrough configuration for raw LaTeX math blocks
[markup.goldmark.extensions.passthrough]
enable = true
[markup.goldmark.extensions.passthrough.delimiters]
inline = [['$', '$'], ['\\(', '\\)']]
block = [['$$', '$$'], ['\\[', '\\]']]

[markup.highlight]
codeFences = true
guessSyntax = true
lineNos = true
style = "monokai"
